- name: Restart Slurmdbd
  become: true
  ansible.builtin.service:
    name: slurmdbd
    state: restarted

- name: Restart Slurmctld
  become: true
  ansible.builtin.service:
    name: slurmctld
    state: restarted

- name: Reconfigure Slurm
  become: true
  ansible.builtin.systemd:
    name: slurmctld
    state: restarted
    daemon_reload: true
