- name: Set shared environment variable
  ansible.builtin.set_fact:
    slurm_builder_env_dir: "{{ ansible_facts['distribution'] }}_{{ ansible_facts['distribution_version'] }}_{{ ansible_facts['architecture'] }}"

- name: Group nodes by Slurm build environment
  ansible.builtin.group_by:
    key: "slurm_env_{{ slurm_builder_env_dir }}"

- name: Set representative node flag
  ansible.builtin.set_fact:
    slurm_builder_is_representative: "{{ inventory_hostname == groups['slurm_env_' + slurm_builder_env_dir] | first }}"

- name: Check if the file exists
  ansible.builtin.find:
    paths: "/opt/clustron_share/{{ slurm_builder_env_dir }}"
    patterns: "slurm-smd_*.deb"
  register: slurm_builder_existing_debs

- name: Set rebuild flag
  ansible.builtin.set_fact:
    slurm_builder_needs_build: "{{ slurm_builder_existing_debs.matched == 0 }}"

- name: Install Debian packaging tools
  become: true
  ansible.builtin.apt:
    name: [lbzip2, build-essential, fakeroot, devscripts, equivs]
    state: present
  when: slurm_builder_needs_build and slurm_builder_is_representative

- name: Clean & Recreate build workspace
  become: true
  ansible.builtin.file:
    path: "/opt/slurm_build"
    state: "{{ item }}"
    mode: '1777'
  loop: [absent, directory]
  when: slurm_builder_needs_build and slurm_builder_is_representative

- name: Create specific src directory
  become: true
  ansible.builtin.file:
    path: /opt/slurm_build/src
    state: directory
    mode: '0755'
  when: slurm_builder_needs_build and slurm_builder_is_representative

- name: Download and Unpack Slurm source
  become: true
  ansible.builtin.unarchive:
    src: "https://download.schedmd.com/slurm/slurm-25.11.4.tar.bz2"
    dest: /opt/slurm_build/src
    remote_src: true
    extra_opts: ['--strip-components=1']
  when: slurm_builder_needs_build and slurm_builder_is_representative

- name: Install dependencies (mk-build-deps)
  become: true
  ansible.builtin.shell: |
    mk-build-deps -i debian/control -t "apt-get -y -o Debug::pkgProblemResolver=yes --no-install-recommends"
  args:
    chdir: /opt/slurm_build/src
  changed_when: true
  when: slurm_builder_needs_build and slurm_builder_is_representative

- name: Build Slurm packages (this could take a while ...)
  ansible.builtin.command: debuild -b -uc -us
  args:
    chdir: /opt/slurm_build/src
  register: slurm_builder_build_output
  async: 3600
  poll: 30
  changed_when: true
  when: slurm_builder_needs_build and slurm_builder_is_representative

- name: Create clustron share folder
  become: true
  ansible.builtin.file:
    path: "/opt/clustron_share/{{ slurm_builder_env_dir }}"
    state: directory
    mode: '0755'
  when: slurm_builder_needs_build and slurm_builder_is_representative

- name: Move generated deb files to shared folder
  become: true
  ansible.builtin.shell: mv /opt/slurm_build/*.deb /opt/clustron_share/{{ slurm_builder_env_dir }}/
  changed_when: true
  when: slurm_builder_needs_build and slurm_builder_is_representative
